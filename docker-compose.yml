services:
  openstream-web:
    container_name: openstream-web
    build:
      context: .
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
        - NEXT_PUBLIC_RTMP_URL=${NEXT_PUBLIC_RTMP_URL}
    networks:
      - octane-net
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL
      - INTERNAL_SOCKET_URL
      - NEXT_PUBLIC_API_URL
      - NEXT_PUBLIC_SOCKET_URL
      - NEXT_PUBLIC_RTMP_URL

networks:
  octane-net:
    external: true
